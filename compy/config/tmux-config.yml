# Directories to search for tmux session targets.
# Used by the t (tmux picker) and tc (tmux + claude) scripts.

directories:
  - path: ~/projects
    depth: 2
    worktrees: true

  - path: ~/git
    depth: 1
    worktrees: true

  - path: ~/sites
    depth: 1
    worktrees: true

# Extra static entries added to the t picker (not used by tc).
extras:
  - /tmp
